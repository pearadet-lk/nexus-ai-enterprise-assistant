apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-files
  namespace: nexusai
  labels:
    app: mcp-files
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-files
  template:
    metadata:
      labels:
        app: mcp-files
    spec:
      containers:
        - name: mcp-files
          image: nexusai/mcp-files:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Documents__Root
              value: /app/data/documents
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-files
  namespace: nexusai
  labels:
    app: mcp-files
spec:
  selector:
    app: mcp-files
  ports:
    - port: 8080
      targetPort: 8080
