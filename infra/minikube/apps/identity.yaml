apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity
  namespace: nexusai
  labels:
    app: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity
  template:
    metadata:
      labels:
        app: identity
    spec:
      containers:
        - name: identity
          image: nexusai/identity:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Keycloak__Authority
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_AUTHORITY
            - name: OpenTelemetry__OtlpEndpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: OTLP_ENDPOINT
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: identity
  namespace: nexusai
  labels:
    app: identity
spec:
  selector:
    app: identity
  ports:
    - port: 8080
      targetPort: 8080
