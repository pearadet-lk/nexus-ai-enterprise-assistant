apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: nexusai
  labels:
    app: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: nexusai/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Keycloak__Authority
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_AUTHORITY
            - name: OpenTelemetry__OtlpEndpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: OTLP_ENDPOINT
            - name: ReverseProxy__Clusters__identity-cluster__Destinations__identity__Address
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: GATEWAY_IDENTITY_URL
            - name: ReverseProxy__Clusters__context-cluster__Destinations__context__Address
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: GATEWAY_CONTEXT_URL
            - name: ReverseProxy__Clusters__agent-cluster__Destinations__agent__Address
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: GATEWAY_AGENT_URL
            - name: ReverseProxy__Clusters__mcp-cluster__Destinations__mcp__Address
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: GATEWAY_MCP_URL
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: nexusai
  labels:
    app: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
