apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
  namespace: nexusai
  labels:
    app: agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: nexusai/agent-service:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Services__ContextService
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: CONTEXT_SERVICE_URL
            - name: Services__McpGateway
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: MCP_GATEWAY_URL
            - name: Keycloak__Authority
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_AUTHORITY
            - name: Keycloak__Issuer
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_ISSUER
            - name: OpenTelemetry__OtlpEndpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: OTLP_ENDPOINT
            - name: OpenAI__ApiKey
              valueFrom:
                secretKeyRef:
                  name: nexusai-secrets
                  key: openai-api-key
                  optional: true
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
  namespace: nexusai
  labels:
    app: agent-service
spec:
  selector:
    app: agent-service
  ports:
    - port: 8080
      targetPort: 8080
