apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-gateway
  namespace: nexusai
  labels:
    app: mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-gateway
  template:
    metadata:
      labels:
        app: mcp-gateway
    spec:
      containers:
        - name: mcp-gateway
          image: nexusai/mcp-gateway:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__Redis
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: REDIS
            - name: Keycloak__Authority
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_AUTHORITY
            - name: Keycloak__Issuer
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: KEYCLOAK_ISSUER
            - name: OpenTelemetry__OtlpEndpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: OTLP_ENDPOINT
            - name: McpServers__0__Id
              value: sql
            - name: McpServers__0__Name
              value: SQL Server MCP
            - name: McpServers__0__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: MCP_SQL_URL
            - name: McpServers__1__Id
              value: files
            - name: McpServers__1__Name
              value: File System MCP
            - name: McpServers__1__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: MCP_FILES_URL
            - name: McpServers__2__Id
              value: jira
            - name: McpServers__2__Name
              value: Jira MCP
            - name: McpServers__2__Endpoint
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: MCP_JIRA_URL
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-gateway
  namespace: nexusai
  labels:
    app: mcp-gateway
spec:
  selector:
    app: mcp-gateway
  ports:
    - port: 8080
      targetPort: 8080
