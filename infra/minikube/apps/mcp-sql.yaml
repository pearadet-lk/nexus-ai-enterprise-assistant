apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sql
  namespace: nexusai
  labels:
    app: mcp-sql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sql
  template:
    metadata:
      labels:
        app: mcp-sql
    spec:
      containers:
        - name: mcp-sql
          image: nexusai/mcp-sql:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: ConnectionStrings__NexusDb
              valueFrom:
                configMapKeyRef:
                  name: nexusai-config
                  key: NEXUS_DB
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-sql
  namespace: nexusai
  labels:
    app: mcp-sql
spec:
  selector:
    app: mcp-sql
  ports:
    - port: 8080
      targetPort: 8080
