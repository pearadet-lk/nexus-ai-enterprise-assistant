apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-jira
  namespace: nexusai
  labels:
    app: mcp-jira
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-jira
  template:
    metadata:
      labels:
        app: mcp-jira
    spec:
      containers:
        - name: mcp-jira
          image: nexusai/mcp-jira:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
            - name: Jira__StorePath
              value: /app/data/jira/issues.json
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-jira
  namespace: nexusai
  labels:
    app: mcp-jira
spec:
  selector:
    app: mcp-jira
  ports:
    - port: 8080
      targetPort: 8080
